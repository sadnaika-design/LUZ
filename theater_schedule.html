<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>סדנת תיאטרון איקה זהר</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --purple:#5b1f8a; --green:#1a7a0a; --red:#cc1a1a; --yellow:#c89600;
  --purple-l:#f0e8ff; --green-l:#d9f5d0; --red-l:#ffe8e8; --yellow-l:#fff8d0;
  --bg:#fafaf8; --surface:#fff; --ink:#1a1a1a; --ink2:#555; --ink3:#aaa;
  --border:#e0ddd8;
  --grad:linear-gradient(135deg,#5b1f8a 0%,#cc1a1a 42%,#e85a00 72%,#f0c840 100%);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}

/* HEADER */
header{background:var(--grad);position:relative;overflow:hidden}
header::after{content:'';position:absolute;inset:0;background:rgba(0,0,0,.15);pointer-events:none}
.hi{display:flex;align-items:center;justify-content:space-between;padding:16px 28px;flex-wrap:wrap;gap:10px;position:relative;z-index:2}
.logo-row{display:flex;align-items:center;gap:14px}
.logo-circ{width:52px;height:52px;border-radius:50%;background:white;display:flex;align-items:center;justify-content:center;font-size:26px;box-shadow:0 2px 14px rgba(0,0,0,.28);flex-shrink:0}
.site-t{font-size:20px;font-weight:900;color:white;text-shadow:0 1px 4px rgba(0,0,0,.3)}
.site-s{font-size:12px;color:rgba(255,255,255,.82);margin-top:2px}
.hbtns{display:flex;gap:8px;align-items:center}
.hbtn{background:rgba(255,255,255,.17);border:1.5px solid rgba(255,255,255,.38);color:white;padding:7px 16px;border-radius:10px;font-family:'Heebo',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .14s;white-space:nowrap}
.hbtn:hover{background:rgba(255,255,255,.3)}
.hbtn.active{background:white;color:var(--purple);border-color:white}
.lo-btn{background:rgba(255,255,255,.14);border:1.5px solid rgba(255,255,255,.3);color:rgba(255,255,255,.85);padding:5px 12px;border-radius:8px;font-family:'Heebo',sans-serif;font-size:12px;cursor:pointer}
.lo-btn:hover{background:rgba(255,255,255,.25)}

main{max-width:1180px;margin:0 auto;padding:28px 18px}

/* CALENDAR */
.mnav{display:flex;align-items:center;gap:14px;margin-bottom:18px}
.mnav h2{font-size:20px;font-weight:800;flex:1;color:var(--purple)}
.nbtn{width:34px;height:34px;border-radius:50%;border:2px solid var(--purple);background:white;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--purple);font-weight:700;transition:all .12s}
.nbtn:hover{background:var(--purple);color:white}
.cal-wrap{background:white;border:2px solid var(--border);border-radius:16px;overflow:hidden;box-shadow:0 4px 22px rgba(91,31,138,.08)}
.ch{display:grid;grid-template-columns:repeat(7,1fr);background:var(--grad)}
.chc{padding:10px 4px;text-align:center;font-size:12px;font-weight:700;color:rgba(255,255,255,.82)}
.chc.ws{color:#ffe066;font-size:13px}
.cb2{display:grid;grid-template-columns:repeat(7,1fr)}
.cd{min-height:80px;padding:7px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);transition:background .1s}
.cd:nth-child(7n){border-right:none}
.cd.other{background:#faf9f8}
.cd.other .dn{color:var(--ink3)}
.cd.today{background:#fff6f6}
.cd.today .dn{color:var(--red);font-weight:800}
.cd.wsd{cursor:pointer}
.cd.wsd:hover{background:#f6eeff}
.dn{font-size:13px;font-weight:600;margin-bottom:4px}
.ddot{font-size:10px;padding:3px 7px;border-radius:6px;font-weight:600;display:inline-block;margin-bottom:2px;line-height:1.5;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.d-sun{background:var(--purple-l);color:var(--purple)}
.d-thu{background:var(--green-l);color:var(--green)}
.d-custom{background:var(--red-l);color:var(--red)}
.d-cancel{background:#333;color:#fff}

/* DAY VIEW */
.dv{display:none}
.dv.on{display:block}
.cv.off{display:none}
.dvh{display:flex;align-items:center;gap:12px;margin-bottom:22px;flex-wrap:wrap}
.bbtn{background:white;border:2px solid var(--purple);color:var(--purple);padding:7px 14px;border-radius:10px;font-family:'Heebo',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .12s}
.bbtn:hover{background:var(--purple);color:white}
.dvh h2{font-size:20px;font-weight:800}
.dbadge{font-size:12px;font-weight:700;padding:4px 12px;border-radius:20px;border:2px solid}

/* CANCEL DAY BANNER */
.cancel-banner{background:#1a1a1a;color:white;border-radius:14px;padding:28px 24px;text-align:center;margin-bottom:20px}
.cancel-banner h3{font-size:22px;font-weight:900;margin-bottom:8px}
.cancel-banner p{font-size:15px;opacity:.8}

/* TABLE */
.sw{overflow-x:auto}
.stbl{width:100%;border-collapse:collapse;background:white;border-radius:14px;overflow:hidden;box-shadow:0 3px 14px rgba(0,0,0,.07);min-width:560px}
.stbl th{padding:11px 10px;font-size:12px;font-weight:700;text-align:center;border-bottom:3px solid var(--border);white-space:nowrap}
.stbl th.tc{background:#f8f5ff;color:var(--ink2);font-weight:500;font-size:11px;width:76px}
.stbl td{padding:0;border:1px solid #eceae0;vertical-align:top}
.stbl td.tcel{padding:8px 10px;text-align:left;color:var(--ink2);font-size:11px;background:#f8f5ff;white-space:nowrap;height:36px;font-weight:500}
.cbl{height:100%;padding:5px 8px;display:flex;flex-direction:column;justify-content:center;gap:2px}
.ct{font-weight:800;font-size:12px;line-height:1.3}
.cn{font-size:10px;opacity:.72;line-height:1.3}
.cht{font-size:10px;opacity:.52;line-height:1.3}

/* GROUP CARDS */
.cards-sec{margin-top:28px}
.cards-sec h3{font-size:16px;font-weight:800;margin-bottom:14px;color:var(--purple)}
.gcards{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:12px}
.gcard{background:white;border-radius:14px;border:2px solid;overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.05)}
.gch{padding:10px 14px;font-size:14px;font-weight:800;display:flex;align-items:center;justify-content:space-between}
.gcb{padding:10px 14px}
.crow{padding:6px 0;border-bottom:1px solid var(--border);font-size:12px}
.crow:last-child{border-bottom:none}
.crow-t{font-weight:700;font-size:11px;color:var(--ink2)}
.crow-d{color:var(--ink);margin-top:2px;font-weight:500}
.ctag{display:inline-block;font-size:10px;padding:2px 7px;border-radius:7px;font-weight:700;margin-top:3px}

/* LOGIN */
.loverlay{position:fixed;inset:0;background:rgba(0,0,0,.58);z-index:1000;display:flex;align-items:center;justify-content:center}
.loverlay.hidden{display:none}
.lbox{background:white;border-radius:20px;padding:36px 32px;width:340px;box-shadow:0 20px 60px rgba(0,0,0,.3);text-align:center}
.llogo{font-size:48px;margin-bottom:16px}
.lbox h2{font-size:20px;font-weight:800;color:var(--purple);margin-bottom:6px}
.lbox p{font-size:13px;color:var(--ink2);margin-bottom:22px}
.lf{width:100%;padding:10px 14px;border:2px solid var(--border);border-radius:10px;font-family:'Heebo',sans-serif;font-size:14px;margin-bottom:11px;text-align:right;transition:border-color .12s}
.lf:focus{outline:none;border-color:var(--purple)}
.lbtn{width:100%;padding:11px;background:var(--grad);color:white;border:none;border-radius:10px;font-family:'Heebo',sans-serif;font-size:15px;font-weight:700;cursor:pointer}
.lbtn:hover{opacity:.9}
.lerr{color:var(--red);font-size:12px;font-weight:600;margin-top:8px;min-height:18px}

/* ADMIN */
.adm{display:none}
.adm.on{display:block}
.adm-grid{display:grid;grid-template-columns:1fr 1.6fr;gap:20px}
@media(max-width:820px){.adm-grid{grid-template-columns:1fr}}
.asec{background:white;border:2px solid var(--border);border-radius:14px;padding:20px;margin-bottom:18px}
.asec h3{font-size:15px;font-weight:800;margin-bottom:14px;color:var(--purple)}
.arow{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-start;margin-bottom:10px}
.arow label{font-size:12px;color:var(--ink2);min-width:58px;padding-top:8px;font-weight:600}
.ainp{padding:8px 12px;border:2px solid var(--border);border-radius:9px;font-family:'Heebo',sans-serif;font-size:13px;background:var(--bg);color:var(--ink);flex:1;min-width:110px;transition:border-color .12s}
.ainp:focus{outline:none;border-color:var(--purple)}
.abtn{padding:8px 16px;border-radius:9px;border:none;font-family:'Heebo',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .12s}
.abtn.pri{background:var(--purple);color:white}
.abtn.pri:hover{opacity:.88}
.abtn.grn{background:var(--green);color:white}
.abtn.grn:hover{opacity:.88}
.abtn.red{background:var(--red-l);color:var(--red);border:2px solid var(--red)}
.abtn.red:hover{background:var(--red);color:white}
.abtn.blk{background:#1a1a1a;color:white}
.abtn.blk:hover{opacity:.85}
.abtn.sec{background:#eee;color:var(--ink2)}
.abtn.sec:hover{background:#ddd}

/* live edit table */
.etbl{width:100%;border-collapse:collapse;border-radius:12px;overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.06)}
.etbl th{padding:9px 8px;font-size:11px;font-weight:700;text-align:center;border-bottom:2px solid var(--border)}
.etbl th.etc{background:#f8f5ff;color:var(--ink2);width:68px;font-weight:500}
.etbl td{border:1px solid #eceae0;vertical-align:top;padding:0;height:34px}
.etbl td.etcel{padding:7px 9px;font-size:11px;background:#f8f5ff;color:var(--ink2);white-space:nowrap;font-weight:500}
.ecell{height:100%;min-height:34px;cursor:pointer;transition:filter .1s;position:relative}
.ecell:hover{filter:brightness(.9)}
.ecell-in{height:100%;padding:4px 7px;display:flex;flex-direction:column;justify-content:center}
.ec-t{font-weight:800;font-size:11px;line-height:1.3}
.ec-s{font-size:10px;opacity:.58;line-height:1.3}
.ecell-add{height:100%;display:flex;align-items:center;justify-content:center;opacity:.25;font-size:20px;cursor:pointer;transition:opacity .12s}
.ecell-add:hover{opacity:.55}

/* slot popup */
.spop{position:fixed;inset:0;background:rgba(0,0,0,.46);z-index:500;display:flex;align-items:center;justify-content:center}
.spop.hidden{display:none}
.sbox{background:white;border-radius:16px;padding:28px;width:380px;box-shadow:0 16px 50px rgba(0,0,0,.22)}
.sbox h3{font-size:16px;font-weight:800;margin-bottom:18px;color:var(--purple)}
.srow{margin-bottom:12px}
.srow label{font-size:12px;color:var(--ink2);display:block;margin-bottom:4px;font-weight:600}
.srow input,.srow select{width:100%;padding:8px 12px;border:2px solid var(--border);border-radius:9px;font-family:'Heebo',sans-serif;font-size:13px;background:var(--bg);color:var(--ink);transition:border-color .12s}
.srow input:focus,.srow select:focus{outline:none;border-color:var(--purple)}
.sbtns{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;flex-wrap:wrap}

/* date list */
.ditem{background:var(--bg);border-radius:10px;padding:11px 14px;margin-bottom:9px;border:1.5px solid var(--border)}
.ditem-h{display:flex;align-items:center;gap:10px;cursor:pointer}
.ditem-title{font-weight:800;font-size:14px;flex:1}
.ditem-date{font-size:12px;color:var(--ink2)}
.ditem-body{display:none;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.ditem-body.open{display:block}

/* teacher color legend */
.legend{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px}
.leg-item{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600}
.leg-dot{width:14px;height:14px;border-radius:4px;flex-shrink:0}

::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:var(--ink3);border-radius:3px}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="loverlay hidden" id="loginOverlay">
  <div class="lbox">
    <div class="llogo">🎭</div>
    <h2>כניסה לניהול</h2>
    <p>אזור מוגן – נא הכנס פרטי גישה</p>
    <input class="lf" type="text" id="lu" placeholder="שם משתמש" autocomplete="off">
    <input class="lf" type="password" id="lp" placeholder="סיסמה">
    <button class="lbtn" onclick="doLogin()">כניסה</button>
    <div class="lerr" id="lerr"></div>
  </div>
</div>

<!-- SLOT POPUP -->
<div class="spop hidden" id="slotPop">
  <div class="sbox">
    <h3 id="spTitle">עריכת שעה</h3>
    <div class="srow"><label>קבוצה</label>
      <select id="spGroup">
        <option value="הו">כיתה ה-ו</option>
        <option value="ז">כיתות ז'</option>
        <option value="דושא">דוש א</option>
        <option value="דושב">דוש ב</option>
        <option value="דושג">דוש ג</option>
        <option value="אנסמבל">אנסמבל</option>
      </select>
    </div>
    <div class="srow"><label>שעת התחלה</label><input type="time" id="spS" step="1800"></div>
    <div class="srow"><label>שעת סיום</label><input type="time" id="spE" step="1800"></div>
    <div class="srow"><label>מורה / תוכן</label><input type="text" id="spT" placeholder='שם מורה / "מופע" / "חזרה"'></div>
    <div class="srow"><label>הערה</label><input type="text" id="spN" placeholder="(אופציונלי)"></div>
    <div class="srow"><label>סוג</label>
      <select id="spTy">
        <option value="רגיל">שיעור רגיל</option>
        <option value="מופע">מופע</option>
        <option value="חזרה">חזרה</option>
        <option value="אימפרוב">אימפרוב</option>
        <option value="צפייה">צפייה</option>
        <option value="שינוי">שינוי</option>
      </select>
    </div>
    <div class="sbtns">
      <button class="abtn sec" onclick="closePop()">ביטול</button>
      <button class="abtn red" id="spDel" onclick="doDelSlot()" style="display:none">מחק</button>
      <button class="abtn grn" onclick="doSaveSlot()">שמור</button>
    </div>
  </div>
</div>

<header>
  <div class="hi">
    <div class="logo-row">
      <div class="logo-circ">🎭</div>
      <div>
        <div class="site-t">סדנת תיאטרון איקה זהר</div>
        <div class="site-s">לוח שעות – ימי ב' וה'</div>
      </div>
    </div>
    <div class="hbtns">
      <button class="hbtn active" id="btn-cal" onclick="showView('cal')">לוח חודשי</button>
      <button class="hbtn" id="btn-adm" onclick="requireLogin()">✏️ ניהול</button>
      <button class="lo-btn hidden" id="lobtn" onclick="doLogout()">התנתק</button>
    </div>
  </div>
</header>

<main>

<!-- CALENDAR -->
<div class="cv" id="calView">
  <div class="mnav">
    <button class="nbtn" onclick="changeMonth(-1)">‹</button>
    <h2 id="mTitle"></h2>
    <button class="nbtn" onclick="changeMonth(1)">›</button>
  </div>
  <div class="cal-wrap" id="calGrid"></div>
</div>

<!-- DAY VIEW -->
<div class="dv" id="dayView">
  <div class="dvh">
    <button class="bbtn" onclick="backToCal()">← חזרה</button>
    <h2 id="dvTitle"></h2>
    <div id="dvBadge" class="dbadge" style="display:none"></div>
  </div>
  <div id="cancelBanner" style="display:none"></div>
  <div id="dayContent"></div>
</div>

<!-- ADMIN -->
<div class="adm" id="admView">
  <div class="adm-grid">
    <div>
      <div class="asec">
        <h3>עריכה חיה של יום</h3>
        <div class="arow">
          <input type="date" id="admDate" class="ainp" style="flex:1" onchange="loadAdmDay()">
          <button class="abtn pri" onclick="loadAdmDay()">טען</button>
        </div>
        <div id="admDayLabel" style="font-size:13px;color:var(--ink2);margin-bottom:10px"></div>

        <!-- cancel day toggle -->
        <div id="cancelRow" style="display:none;margin-bottom:14px;padding:12px;background:#f5f5f5;border-radius:10px;border:2px solid #ddd">
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
            <span style="font-size:13px;font-weight:700">ביטול סדנה ליום זה</span>
            <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px">
              <input type="checkbox" id="cancelCheck" onchange="toggleCancelDay()" style="width:18px;height:18px;cursor:pointer">
              <span>בטל את כל הפעילות</span>
            </label>
          </div>
          <div id="cancelNoteRow" style="display:none">
            <input type="text" id="cancelNote" class="ainp" placeholder="הסבר / הערה לתלמידים..." style="width:100%" oninput="saveCancelNote()">
          </div>
        </div>

        <!-- title -->
        <div id="titleRow" style="display:none;margin-bottom:12px">
          <label style="font-size:12px;color:var(--ink2);font-weight:600;display:block;margin-bottom:4px">כותרת (אופציונלי)</label>
          <input type="text" id="admTitle" class="ainp" style="width:100%" placeholder='למשל "אימפרו 19:00"' oninput="saveTitle()">
        </div>

        <div class="sw" id="admTblWrap"></div>
        <div id="admAddBtn" style="display:none;margin-top:10px">
          <button class="abtn pri" style="font-size:12px;padding:6px 14px" onclick="openNewSlot()">+ הוסף שעה</button>
          <button class="abtn red" id="admDelDayBtn" style="font-size:12px;padding:6px 14px;display:none;margin-right:6px" onclick="deleteAdmDay()">איפוס יום זה</button>
        </div>
      </div>
    </div>
    <div>
      <div class="asec">
        <h3>ימים מותאמים</h3>
        <div id="admList"></div>
      </div>
      <div class="asec">
        <h3>🎭 תאריכי הופעות</h3>
        <p style="font-size:12px;color:var(--ink2);margin-bottom:12px">לחץ "ערוך לוז" כדי לקפוץ ישירות ולערוך את היום</p>
        <div id="showsList"></div>
      </div>
    </div>
  </div>
</div>

</main>

<script>
// ── TEACHER COLORS ──
const TEACHER_COLORS={
  'איתמר':          {bg:'#fff4b0',text:'#7a5800',border:'#c89600'},
  'איקה':           {bg:'#ffe0e0',text:'#8a0808',border:'#cc1a1a'},
  'איילה, שי ואורי':{bg:'#fce0ff',text:'#5a007a',border:'#8b00b0'},
  'איילה':          {bg:'#d0f0ff',text:'#004a7a',border:'#0077cc'},
};
const DEFAULT_SLOT_COLOR={bg:'#e8e0f5',text:'#3a1a6a',border:'#5b1f8a'};

function slotColors(teacher,stype){
  // special type overrides
  const TYPE_COL={
    'מופע':  {bg:'#ead5ff',text:'#4a0072',border:'#7b1fa2'},
    'חזרה':  {bg:'#ffe0c0',text:'#7a2800',border:'#e05000'},
    'אימפרוב':{bg:'#d0e4ff',text:'#0a2d7a',border:'#1550c0'},
    'צפייה': {bg:'#fff5c0',text:'#6a4000',border:'#c89600'},
    'שינוי': {bg:'#c8f5e0',text:'#004a30',border:'#009060'},
  };
  if(stype&&TYPE_COL[stype])return TYPE_COL[stype];
  // teacher-specific
  for(const[key,val] of Object.entries(TEACHER_COLORS)){
    if(teacher&&teacher.includes(key))return val;
  }
  return DEFAULT_SLOT_COLOR;
}

// ── GROUP COLORS ──
const COL={
  הו:    {bg:'#f0e8ff',text:'#5b1f8a',border:'#5b1f8a'},
  ז:     {bg:'#d9f5d0',text:'#1a7a0a',border:'#1a7a0a'},
  דושא:  {bg:'#ffe8e8',text:'#8a0808',border:'#cc1a1a'},
  דושב:  {bg:'#fff8d0',text:'#7a5800',border:'#c89600'},
  דושג:  {bg:'#d8eeff',text:'#0a2d7a',border:'#2a5acc'},
  אנסמבל:{bg:'#ffd8c0',text:'#7a2800',border:'#e05000'},
};
const GL={הו:"כיתה ה-ו",ז:"כיתות ז'",דושא:"דוש א",דושב:"דוש ב",דושג:"דוש ג",אנסמבל:"אנסמבל"};

let cy,cm;
function initCal(){const n=new Date();cy=n.getFullYear();cm=n.getMonth();renderCal()}
function changeMonth(d){cm+=d;if(cm>11){cm=0;cy++}if(cm<0){cm=11;cy--}renderCal()}
function renderCal(){
  document.getElementById('mTitle').textContent=`${HEM[cm]} ${cy}`;
  const g=document.getElementById('calGrid');
  const first=new Date(cy,cm,1).getDay();
  const dim=new Date(cy,cm+1,0).getDate();
  const today=new Date();today.setHours(0,0,0,0);
  let h='<div class="ch">';
  HED.forEach((d,i)=>h+=`<div class="chc${(i===1||i===4)?' ws':''}">${d}</div>`);
  h+='</div><div class="cb2">';
  let cell=0;
  for(let i=0;i<first;i++){h+=`<div class="cd other"><div class="dn"></div></div>`;cell++}
  for(let d=1;d<=dim;d++){
    const dt=new Date(cy,cm,d);const dow=dt.getDay();
    const isWS=dow===1||dow===4;const ds=fmtD(dt);
    const isToday=dt.getTime()===today.getTime();
    const cu=customs[ds];
    const isCancelled=cu&&cu.cancelled;
    const isCustom=cu&&!cu.cancelled&&Object.keys(cu.groups||{}).length>0;
    const isShow=SHOWS.some(s=>s.date===ds);
    let cls='cd'+(isWS?' wsd':'')+(isToday?' today':'');
    let inner=`<div class="dn">${d}</div>`;
    if(isWS){
      const isThu=dow===4;
      if(isCancelled){
        inner+=`<div class="ddot d-cancel">✕ מבוטל</div>`;
      }else if(isShow){
        const sh=SHOWS.find(s=>s.date===ds);
        const nm=sh.name.length>14?sh.name.slice(0,14)+'…':sh.name;
        inner+=`<div class="ddot d-custom">🎭 ${nm}</div>`;
      }else if(isCustom){
        const ttl=cu.title||'';
        inner+=`<div class="ddot d-custom">✦ ${ttl.length>14?ttl.slice(0,14)+'…':ttl||'שינויים'}</div>`;
      }else{
        inner+=`<div class="ddot ${isThu?'d-thu':'d-sun'}">${isThu?"יום ה'":'יום ב\''}</div>`;
      }
    }
    const oc=isWS?`onclick="openDay('${ds}',${dow})"`:'';
    h+=`<div class="${cls}" ${oc}>${inner}</div>`;
    cell++;
  }
  const rem=(7-(cell%7))%7;
  for(let i=1;i<=rem;i++)h+=`<div class="cd other"></div>`;
  h+='</div>';
  g.innerHTML=h;
}

function buildLegend(sched){
  const teachers=new Set();
  sched.forEach(g=>(g.slots||[]).forEach(s=>teachers.add(s.teacher)));
  let h='<div class="legend">';
  teachers.forEach(t=>{

  });
  h+='</div>';
  return h;
}

// ── SCHEDULE BUILDER ──
function buildSched(cu,dk){
  return DEF[dk].map(bg=>{
    const cg=cu&&cu.groups&&cu.groups[bg.group];
    return cg?{...bg,...cg}:bg;
  });
}

function buildCovMap(grp){
  const cov={};
  (grp.slots||[]).forEach(sl=>{
    for(let t=toMin(sl.start);t<toMin(sl.end);t+=30)
      cov[t]={teacher:sl.teacher,note:sl.note,type:sl.type,start:sl.start,end:sl.end};
  });
  return cov;
}

function buildCellMaps(groups,sched){
  const slots=[];for(let t=16*60;t<=22*60;t+=30)slots.push(t);
  return groups.map(g=>{
    const grp=sched.find(s=>s.group===g)||{slots:[]};
    const cov=buildCovMap(grp);
    const cm={};let i=0;
    while(i<slots.length){
      const t=slots[i];const cv=cov[t];
      if(!cv){cm[t]={t:'e'};i++;continue;}
      let span=1;
      while(i+span<slots.length){
        const nc=cov[slots[i+span]];
        if(nc&&nc.start===cv.start&&nc.end===cv.end)span++;else break;
      }
      cm[t]={t:'c',span,teacher:cv.teacher,note:cv.note,stype:cv.type,start:cv.start,end:cv.end};
      for(let s=1;s<span;s++)cm[slots[i+s]]={t:'s'};
      i+=span;
    }
    return cm;
  });
}

function renderViewTable(sched,hEl,bEl){
  const groups=sched.map(s=>s.group);
  const slots=[];for(let t=16*60;t<=22*60;t+=30)slots.push(t);
  let hh='<tr><th class="tc">שעה</th>';
  groups.forEach(g=>{const c=COL[g];hh+=`<th style="background:${c.bg};color:${c.text};border-bottom:3px solid ${c.border}">${GL[g]}</th>`});
  hh+='</tr>';hEl.innerHTML=hh;
  const cms=buildCellMaps(groups,sched);
  let body='';
  slots.forEach(t=>{
    body+=`<tr><td class="tcel">${minS(t)}</td>`;
    groups.forEach((g,gi)=>{
      const cell=cms[gi][t];
      if(!cell||cell.t==='s')return;
      if(cell.t==='e'){body+=`<td></td>`;return;}
      const c=slotColors(cell.teacher,cell.stype);
      body+=`<td rowspan="${cell.span}" style="background:${c.bg};border:1.5px solid ${c.border}"><div class="cbl" style="color:${c.text}"><div class="ct">${cell.teacher}</div>${cell.note?`<div class="cn">${cell.note}</div>`:''}<div class="cht">${cell.start}–${cell.end}</div></div></td>`;
    });
    body+='</tr>';
  });
  bEl.innerHTML=body;
}

function renderCards(sched){
  const el=document.getElementById('_cards');if(!el)return;
  let html='';
  sched.forEach(grp=>{
    const g=grp.group;const c=COL[g];
    html+=`<div class="gcard" style="border-color:${c.border}"><div class="gch" style="background:${c.bg};color:${c.text}"><span>${GL[g]}</span><span style="font-size:11px;opacity:.7;font-weight:500">${grp.start||''}${grp.end?'–'+grp.end:''}</span></div><div class="gcb">`;
    (grp.slots||[]).forEach(sl=>{
      const tc=slotColors(sl.teacher,sl.type);
      const ts=`background:${tc.bg};color:${tc.text};border:1px solid ${tc.border}`;
      html+=`<div class="crow"><div class="crow-t">${sl.start}–${sl.end}</div><div class="crow-d">${sl.teacher}${sl.note?' – '+sl.note:''}</div><span class="ctag" style="${ts}">${sl.type}</span></div>`;
    });
    if(!(grp.slots||[]).length)html+=`<div style="font-size:12px;color:#888;padding:4px 0">לא לומדים ביום זה</div>`;
    html+=`</div></div>`;
  });
  el.innerHTML=html;
}

function doSaveSlot(){
  const start=document.getElementById('spS').value;
  const end=document.getElementById('spE').value;
  const teacher=document.getElementById('spT').value.trim();
  const note=document.getElementById('spN').value.trim();
  const type=document.getElementById('spTy').value;
  const group=document.getElementById('spGroup').value;
  if(!start||!end||!teacher){alert('נא למלא שעות ומורה');return;}
  const ds=admDs;
  ensureDay(ds);
  const cu=customs[ds];
  if(!cu.groups[group]){
    const defGrp=DEF[admDk].find(s=>s.group===group);
    cu.groups[group]=defGrp?JSON.parse(JSON.stringify({start:defGrp.start,end:defGrp.end,slots:[...defGrp.slots]})):{start,end,slots:[]};
  }
  const sl=cu.groups[group].slots;
  if(isNew){sl.push({start,end,teacher,note,type});}
  else{sl[editIdx]={start,end,teacher,note,type};}
  // recalc group span
  cu.groups[group].start=sl.reduce((mn,s)=>toMin(s.start)<toMin(mn)?s.start:mn,sl[0].start);
  cu.groups[group].end=sl.reduce((mx,s)=>toMin(s.end)>toMin(mx)?s.end:mx,sl[0].end);
  save();closePop();renderAdmTable();renderCal();renderAdmList();
  document.getElementById('admDelDayBtn').style.display='inline-flex';
}

function doDelSlot(){
  if(!confirm('מחק שיעור זה?'))return;
  const ds=admDs;
  // If no custom day yet, copy from default so we can delete one slot
  ensureDay(ds);
  const cu=customs[ds];
  const g=editGrp;
  if(!cu.groups[g]){
    const defGrp=DEF[admDk].find(s=>s.group===g);
    if(!defGrp)return;
    cu.groups[g]=JSON.parse(JSON.stringify({start:defGrp.start,end:defGrp.end,slots:[...defGrp.slots]}));
  }
  const grp=cu.groups[g];
  grp.slots.splice(editIdx,1);
  if(!grp.slots.length)delete cu.groups[g];
  cleanupDay(ds);
  save();closePop();renderAdmTable();renderCal();renderAdmList();
  document.getElementById('admDelDayBtn').style.display=customs[ds]?'inline-flex':'none';
}

function deleteAdmDay(){
  if(!admDs||!confirm('איפוס יום זה לברירת מחדל?'))return;
  delete customs[admDs];
  save();renderAdmTable();renderCal();renderAdmList();
  document.getElementById('admDelDayBtn').style.display='none';
  document.getElementById('admTitle').value='';
  document.getElementById('cancelCheck').checked=false;
  document.getElementById('cancelNoteRow').style.display='none';
}

function renderAdmList(){
  const el=document.getElementById('admList');
  const keys=Object.keys(customs).sort();
  if(!keys.length){el.innerHTML='<p style="font-size:13px;color:#888">אין ימים מותאמים</p>';return;}
  let html='';
  keys.forEach(ds=>{
    const cu=customs[ds];
    const[y,mo,d]=ds.split('-').map(Number);
    const dk=cu.dayKey||'thu';
    const dn=dk==='thu'?"יום ה'":'יום ב\'';
    const isCancelled=cu.cancelled;
    const ttl=isCancelled?`✕ מבוטל${cu.cancelNote?' – '+cu.cancelNote:''}`:cu.title||`${dn} ${String(d).padStart(2,'0')}/${String(mo).padStart(2,'0')}/${String(y).slice(-2)}`;
    html+=`<div class="ditem">
      <div class="ditem-h" onclick="togDItem('_di_${ds.replace(/-/g,'')}')">
        <div class="ditem-title">${ttl}</div>
        <div class="ditem-date">${String(d).padStart(2,'0')}/${String(mo).padStart(2,'0')}/${String(y).slice(-2)}</div>
        <span style="color:#999;font-size:14px">▾</span>
      </div>
      <div class="ditem-body" id="_di_${ds.replace(/-/g,'')}">
        <button style="background:var(--purple-l);color:var(--purple);border:2px solid var(--purple);border-radius:7px;padding:4px 10px;font-family:'Heebo',sans-serif;font-size:11px;font-weight:700;cursor:pointer;margin-bottom:8px" onclick="loadAndEdit('${ds}')">✏️ ערוך</button>
        ${!isCancelled?Object.entries(cu.groups||{}).map(([g,gd])=>{
          const c=COL[g]||{bg:'#eee',text:'#333',border:'#ccc'};
          return`<div style="margin-bottom:5px"><span style="background:${c.bg};color:${c.text};border:1px solid ${c.border};padding:2px 8px;border-radius:6px;font-size:11px;font-weight:700">${GL[g]||g}</span>${(gd.slots||[]).map(sl=>`<span style="font-size:11px;color:#444;margin-right:8px"> ${sl.start}–${sl.end} ${sl.teacher}</span>`).join('')}</div>`;
        }).join(''):''}
      </div>
    </div>`;
  });
  el.innerHTML=html;
}

function togDItem(id){const el=document.getElementById(id);if(el)el.classList.toggle('open')}
function loadAndEdit(ds){
  document.getElementById('admDate').value=ds;
  loadAdmDay();
  document.getElementById('admDate').scrollIntoView({behavior:'smooth',block:'center'});
}

function renderShowsSection(){
  const el=document.getElementById('showsList');if(!el)return;
  // group by month
  const byMonth={};
  SHOWS.forEach(sh=>{
    const[y,mo,d]=sh.date.split('-').map(Number);
    const key=`${y}-${mo}`;
    if(!byMonth[key])byMonth[key]={label:`${HEM[mo-1]} ${y}`,shows:[]};
    byMonth[key].shows.push({...sh,d,mo,y});
  });
  let html='';
  Object.values(byMonth).forEach(m=>{
    html+=`<div style="margin-bottom:16px"><div style="font-size:12px;font-weight:800;color:var(--purple);margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em">${m.label}</div>`;
    m.shows.forEach(sh=>{
      const c=sh.group&&COL[sh.group]?COL[sh.group]:{bg:'#f0e8ff',text:'#5b1f8a',border:'#5b1f8a'};
      const ddStr=`${String(sh.d).padStart(2,'0')}/${String(sh.mo).padStart(2,'0')}/${String(sh.y).slice(-2)}`;
      html+=`<div style="display:flex;align-items:center;gap:10px;padding:7px 10px;margin-bottom:5px;background:white;border-radius:9px;border:1.5px solid ${c.border}">
        <span style="font-size:12px;font-weight:800;color:var(--ink2);min-width:64px">${ddStr}</span>
        <span style="font-size:13px;font-weight:600;flex:1">${sh.name}</span>
        <button style="background:${c.bg};color:${c.text};border:1.5px solid ${c.border};border-radius:7px;padding:3px 10px;font-family:'Heebo',sans-serif;font-size:11px;font-weight:700;cursor:pointer" onclick="loadAndEdit('${sh.date}')">ערוך לוז</button>
      </div>`;
    });
    html+='</div>';
  });
  el.innerHTML=html;
}
