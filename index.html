<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>סדנת תיאטרון איקה זהר</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --purple:#5b1f8a;--green:#1a7a0a;--red:#cc1a1a;--yellow:#c89600;
  --purple-l:#f0e8ff;--green-l:#d9f5d0;--red-l:#ffe8e8;--yellow-l:#fff8d0;
  --bg:#fafaf8;--surface:#fff;--ink:#1a1a1a;--ink2:#555;--ink3:#aaa;
  --border:#e0ddd8;
  --grad:linear-gradient(135deg,#5b1f8a 0%,#cc1a1a 42%,#e85a00 72%,#f0c840 100%);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}
header{background:var(--grad);position:relative;overflow:hidden}
header::after{content:'';position:absolute;inset:0;background:rgba(0,0,0,.15);pointer-events:none}
.hi{display:flex;align-items:center;justify-content:space-between;padding:16px 28px;flex-wrap:wrap;gap:10px;position:relative;z-index:2}
.logo-row{display:flex;align-items:center;gap:14px}
.logo-circ{width:52px;height:52px;border-radius:50%;background:white;display:flex;align-items:center;justify-content:center;font-size:26px;box-shadow:0 2px 14px rgba(0,0,0,.28);flex-shrink:0}
.site-t{font-size:20px;font-weight:900;color:white;text-shadow:0 1px 4px rgba(0,0,0,.3)}
.site-s{font-size:12px;color:rgba(255,255,255,.82);margin-top:2px}
.hbtns{display:flex;gap:8px;align-items:center}
.hbtn{background:white;border:2px solid var(--purple);color:var(--purple);padding:7px 16px;border-radius:10px;font-family:'Heebo',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .14s;white-space:nowrap}
.hbtn:hover{background:var(--purple-l)}
.hbtn.active{background:var(--purple);color:white;border-color:var(--purple)}
.lo-btn{background:rgba(255,255,255,.9);border:1.5px solid var(--purple);color:var(--purple);padding:5px 12px;border-radius:8px;font-family:'Heebo',sans-serif;font-size:12px;font-weight:600;cursor:pointer}
main{max-width:1180px;margin:0 auto;padding:28px 18px}

/* LOADING */
.loading-bar{text-align:center;padding:60px 20px;color:var(--ink2)}
.loading-bar .spin{font-size:32px;display:block;margin-bottom:12px;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* STATUS */
.status-bar{background:white;border:2px solid var(--border);border-radius:10px;padding:10px 16px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.status-txt{font-size:12px;font-weight:600}

/* CALENDAR */
.mnav{display:flex;align-items:center;gap:14px;margin-bottom:18px}
.mnav h2{font-size:20px;font-weight:800;flex:1;color:var(--purple)}
.nbtn{width:34px;height:34px;border-radius:50%;border:2px solid var(--purple);background:white;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--purple);font-weight:700;transition:all .12s}
.nbtn:hover{background:var(--purple);color:white}
.cal-wrap{background:white;border:2px solid var(--border);border-radius:16px;overflow:hidden;box-shadow:0 4px 22px rgba(91,31,138,.08)}
.ch{display:grid;grid-template-columns:repeat(7,1fr);background:var(--grad)}
.chc{padding:10px 4px;text-align:center;font-size:12px;font-weight:700;color:rgba(255,255,255,.82)}
.chc.ws{color:#ffe066;font-size:13px}
.cb2{display:grid;grid-template-columns:repeat(7,1fr)}
.cd{min-height:80px;padding:7px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);transition:background .1s}
.cd:nth-child(7n){border-right:none}
.cd.other{background:#faf9f8}
.cd.other .dn{color:var(--ink3)}
.cd.today{background:#fff6f6}
.cd.today .dn{color:var(--red);font-weight:800}
.cd.wsd{cursor:pointer}
.cd.wsd:hover{background:#f6eeff}
.dn{font-size:13px;font-weight:600;margin-bottom:4px}
.ddot{font-size:10px;padding:3px 7px;border-radius:6px;font-weight:600;display:inline-block;margin-bottom:2px;line-height:1.5;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.d-sun{background:var(--purple-l);color:var(--purple)}
.d-thu{background:var(--green-l);color:var(--green)}
.d-mod{background:var(--red-l);color:var(--red)}
.d-cancel{background:#333;color:#fff}
.d-show{background:#f0d5ff;color:#5b1f8a}

/* DAY VIEW */
.dv{display:none}.dv.on{display:block}
.cv.off{display:none}
.dvh{display:flex;align-items:center;gap:12px;margin-bottom:22px;flex-wrap:wrap}
.bbtn{background:white;border:2px solid var(--purple);color:var(--purple);padding:7px 14px;border-radius:10px;font-family:'Heebo',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .12s}
.bbtn:hover{background:var(--purple);color:white}
.dvh h2{font-size:20px;font-weight:800}
.dbadge{font-size:12px;font-weight:700;padding:4px 12px;border-radius:20px;border:2px solid}
.cancel-banner{background:#1a1a1a;color:white;border-radius:14px;padding:28px 24px;text-align:center;margin-bottom:20px}
.cancel-banner h3{font-size:22px;font-weight:900;margin-bottom:8px}

/* TABLE */
.sw{overflow-x:auto}
.stbl{width:100%;border-collapse:collapse;background:white;border-radius:14px;overflow:hidden;box-shadow:0 3px 14px rgba(0,0,0,.07);min-width:560px}
.stbl th{padding:11px 10px;font-size:12px;font-weight:700;text-align:center;border-bottom:3px solid var(--border);white-space:nowrap}
.stbl th.tc{background:#f8f5ff;color:var(--ink2);font-weight:500;font-size:11px;width:76px}
.stbl td{padding:0;border:1px solid #eceae0;vertical-align:top}
.stbl td.tcel{padding:8px 10px;text-align:left;color:var(--ink2);font-size:11px;background:#f8f5ff;white-space:nowrap;height:36px;font-weight:500}
.cbl{height:100%;padding:5px 8px;display:flex;flex-direction:column;justify-content:center;gap:2px}
.ct{font-weight:800;font-size:12px;line-height:1.3}
.cn{font-size:10px;opacity:.72;line-height:1.3}
.cht{font-size:10px;opacity:.52;line-height:1.3}

/* GROUP CARDS */
.cards-sec{margin-top:28px}
.cards-sec h3{font-size:16px;font-weight:800;margin-bottom:14px;color:var(--purple)}
.gcards{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:12px}
.gcard{background:white;border-radius:14px;border:2px solid;overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.05)}
.gch{padding:10px 14px;font-size:14px;font-weight:800;display:flex;align-items:center;justify-content:space-between}
.gcb{padding:10px 14px}
.crow{padding:6px 0;border-bottom:1px solid var(--border);font-size:12px}
.crow:last-child{border-bottom:none}
.crow-t{font-weight:700;font-size:11px;color:var(--ink2)}
.crow-d{color:var(--ink);margin-top:2px;font-weight:500}
.ctag{display:inline-block;font-size:10px;padding:2px 7px;border-radius:7px;font-weight:700;margin-top:3px}
.legend{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px}
.leg-item{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600}
.leg-dot{width:14px;height:14px;border-radius:4px;flex-shrink:0}

/* LOGIN */
.loverlay{position:fixed;inset:0;background:rgba(0,0,0,.58);z-index:1000;display:flex;align-items:center;justify-content:center}
.loverlay.hidden{display:none}
.lbox{background:white;border-radius:20px;padding:36px 32px;width:340px;box-shadow:0 20px 60px rgba(0,0,0,.3);text-align:center}
.llogo{font-size:48px;margin-bottom:16px}
.lbox h2{font-size:20px;font-weight:800;color:var(--purple);margin-bottom:6px}
.lbox p{font-size:13px;color:var(--ink2);margin-bottom:22px}
.lf{width:100%;padding:10px 14px;border:2px solid var(--border);border-radius:10px;font-family:'Heebo',sans-serif;font-size:14px;margin-bottom:11px;text-align:right;transition:border-color .12s}
.lf:focus{outline:none;border-color:var(--purple)}
.lbtn{width:100%;padding:11px;background:var(--grad);color:white;border:none;border-radius:10px;font-family:'Heebo',sans-serif;font-size:15px;font-weight:700;cursor:pointer}
.lerr{color:var(--red);font-size:12px;font-weight:600;margin-top:8px;min-height:18px}

/* ADMIN */
.adm{display:none}.adm.on{display:block}
.adm-grid{display:grid;grid-template-columns:280px 1fr;gap:20px}
@media(max-width:820px){.adm-grid{grid-template-columns:1fr}}
.asec{background:white;border:2px solid var(--border);border-radius:14px;padding:20px;margin-bottom:18px}
.asec h3{font-size:15px;font-weight:800;margin-bottom:14px;color:var(--purple)}
.arow{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-start;margin-bottom:10px}
.ainp{padding:8px 12px;border:2px solid var(--border);border-radius:9px;font-family:'Heebo',sans-serif;font-size:13px;background:var(--bg);color:var(--ink);flex:1;min-width:110px;transition:border-color .12s}
.ainp:focus{outline:none;border-color:var(--purple)}
.abtn{padding:8px 16px;border-radius:9px;border:none;font-family:'Heebo',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .12s}
.abtn.pri{background:var(--purple);color:white}.abtn.pri:hover{opacity:.88}
.abtn.grn{background:var(--green);color:white}.abtn.grn:hover{opacity:.88}
.abtn.red{background:var(--red-l);color:var(--red);border:2px solid var(--red)}.abtn.red:hover{background:var(--red);color:white}
.abtn.sec{background:#eee;color:var(--ink2)}.abtn.sec:hover{background:#ddd}

.etbl{width:100%;border-collapse:collapse;border-radius:12px;overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.06)}
.etbl th{padding:9px 8px;font-size:11px;font-weight:700;text-align:center;border-bottom:2px solid var(--border)}
.etbl th.etc{background:#f8f5ff;color:var(--ink2);width:68px;font-weight:500}
.etbl td{border:1px solid #eceae0;vertical-align:top;padding:0;height:34px}
.etbl td.etcel{padding:7px 9px;font-size:11px;background:#f8f5ff;color:var(--ink2);white-space:nowrap;font-weight:500}
.ecell{height:100%;min-height:34px;cursor:pointer;transition:filter .1s}
.ecell:hover{filter:brightness(.88)}
.ecell-in{height:100%;padding:4px 7px;display:flex;flex-direction:column;justify-content:center}
.ec-t{font-weight:800;font-size:11px;line-height:1.3}
.ec-s{font-size:10px;opacity:.58;line-height:1.3}
.ecell-add{height:100%;display:flex;align-items:center;justify-content:center;opacity:.2;font-size:20px;cursor:pointer;transition:opacity .12s}
.ecell-add:hover{opacity:.5}

.spop{position:fixed;inset:0;background:rgba(0,0,0,.46);z-index:500;display:flex;align-items:center;justify-content:center}
.spop.hidden{display:none}
.sbox{background:white;border-radius:16px;padding:28px;width:380px;box-shadow:0 16px 50px rgba(0,0,0,.22)}
.sbox h3{font-size:16px;font-weight:800;margin-bottom:18px;color:var(--purple)}
.srow{margin-bottom:12px}
.srow label{font-size:12px;color:var(--ink2);display:block;margin-bottom:4px;font-weight:600}
.srow input,.srow select{width:100%;padding:8px 12px;border:2px solid var(--border);border-radius:9px;font-family:'Heebo',sans-serif;font-size:13px;background:var(--bg);color:var(--ink);transition:border-color .12s}
.srow input:focus,.srow select:focus{outline:none;border-color:var(--purple)}
.sbtns{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;flex-wrap:wrap}

.ditem{background:var(--bg);border-radius:10px;padding:11px 14px;margin-bottom:9px;border:1.5px solid var(--border)}
.ditem-h{display:flex;align-items:center;gap:10px;cursor:pointer}
.ditem-title{font-weight:800;font-size:14px;flex:1}
.ditem-date{font-size:12px;color:var(--ink2)}
.ditem-body{display:none;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.ditem-body.open{display:block}

/* PRODUCTIONS */
.prod{display:none}.prod.on{display:block}
.prod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:24px;margin-top:4px}
.prod-card{background:white;border-radius:18px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.09);border:2px solid var(--border);transition:transform .15s,box-shadow .15s}
.prod-card:hover{transform:translateY(-3px);box-shadow:0 8px 28px rgba(91,31,138,.13)}
.prod-poster{width:100%;aspect-ratio:3/4;object-fit:cover;display:block;background:#f0e8ff}
.prod-poster-placeholder{width:100%;aspect-ratio:3/4;background:var(--grad);display:flex;align-items:center;justify-content:center;font-size:52px}
.prod-info{padding:16px}
.prod-name{font-size:17px;font-weight:900;color:var(--purple);margin-bottom:10px}
.prod-rows{display:flex;flex-direction:column;gap:6px}
.prod-row{display:flex;gap:8px;font-size:12px;align-items:flex-start}
.prod-label{font-weight:700;color:var(--ink2);min-width:52px;flex-shrink:0}
.prod-val{color:var(--ink);font-weight:500;line-height:1.5}
.prod-times{display:flex;flex-wrap:wrap;gap:4px;margin-top:2px}
.prod-time{background:var(--purple-l);color:var(--purple);padding:2px 9px;border-radius:8px;font-size:11px;font-weight:700}

::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:var(--ink3);border-radius:3px}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="loverlay hidden" id="loginOverlay">
  <div class="lbox">
    <div class="llogo">🎭</div>
    <h2>כניסה לניהול</h2>
    <p>אזור מוגן</p>
    <input class="lf" type="text" id="lu" placeholder="שם משתמש" autocomplete="off">
    <input class="lf" type="password" id="lp" placeholder="סיסמה">
    <button class="lbtn" onclick="doLogin()">כניסה</button>
    <div class="lerr" id="lerr"></div>
  </div>
</div>

<!-- SLOT POPUP -->
<div class="spop hidden" id="slotPop">
  <div class="sbox">
    <h3 id="spTitle">עריכת שעה</h3>
    <div class="srow"><label>קבוצה</label>
      <select id="spGroup">
        <option value="הו">כיתה ה-ו</option>
        <option value="ז">כיתות ז'</option>
        <option value="דושא">דוש א</option>
        <option value="דושב">דוש ב</option>
        <option value="דושג">דוש ג</option>
        <option value="אנסמבל">אנסמבל</option>
      </select>
    </div>
    <div class="srow"><label>שעת התחלה</label><input type="time" id="spS" step="1800"></div>
    <div class="srow"><label>שעת סיום</label><input type="time" id="spE" step="1800"></div>
    <div class="srow"><label>מורה / תוכן</label><input type="text" id="spT" placeholder='שם מורה / "מופע"'></div>
    <div class="srow"><label>הערה</label><input type="text" id="spN" placeholder="(אופציונלי)"></div>
    <div class="srow"><label>סוג</label>
      <select id="spTy">
        <option value="רגיל">שיעור רגיל</option>
        <option value="מופע">מופע</option>
        <option value="חזרה">חזרה</option>
        <option value="אימפרוב">אימפרוב</option>
        <option value="צפייה">צפייה</option>
        <option value="שינוי">שינוי</option>
      </select>
    </div>
    <div class="sbtns">
      <button class="abtn sec" onclick="closePop()">ביטול</button>
      <button class="abtn red" id="spDel" onclick="doDelSlot()" style="display:none">מחק שיעור</button>
      <button class="abtn grn" onclick="doSaveSlot()">שמור</button>
    </div>
  </div>
</div>

<!-- PRODUCTION EDIT POPUP -->
<div class="spop hidden" id="prodPop">
  <div class="sbox" style="width:480px;max-width:96vw;max-height:90vh;overflow-y:auto">
    <h3 id="prodPopTitle">עריכת הפקה</h3>
    <div class="srow"><label>שם הפקה</label><input type="text" id="ppName"></div>
    <div class="srow"><label>קבוצה</label><input type="text" id="ppGroup" placeholder='למשל "דוש ב"'></div>
    <div class="srow"><label>מיקום</label><input type="text" id="ppLocation" placeholder='למשל "אולם התיאטרון"'></div>
    <div class="srow"><label>שם קובץ פוסטר</label><input type="text" id="ppPoster" placeholder='למשל "impro.png"'></div>
    <div style="margin-bottom:12px">
      <label style="font-size:12px;color:var(--ink2);display:block;margin-bottom:6px;font-weight:600">תאריכים ושעות</label>
      <div id="ppDates"></div>
      <button class="abtn sec" style="font-size:12px;padding:5px 12px;margin-top:8px" onclick="addProdDate()">+ הוסף תאריך</button>
    </div>
    <div class="sbtns">
      <button class="abtn sec" onclick="closeProdPop()">ביטול</button>
      <button class="abtn grn" onclick="saveProdEdit()">💾 שמור</button>
    </div>
  </div>
</div>


  <div class="hi">
    <div class="logo-row">
      <div class="logo-circ">🎭</div>
      <div>
        <div class="site-t">סדנת תיאטרון איקה זהר</div>
        <div class="site-s">לוח שעות – ימי ב' וה'</div>
      </div>
    </div>
    <div class="hbtns">
      <button class="hbtn active" id="btn-cal" onclick="showView('cal')">לוח חודשי</button>
      <button class="hbtn" id="btn-prod" onclick="showView('prod')">🎭 הפקות</button>
      <button class="hbtn" id="btn-adm" onclick="requireLogin()">✏️ ניהול</button>
      <button class="lo-btn hidden" id="lobtn" onclick="doLogout()">התנתק</button>
    </div>
  </div>
</header>

<main>

<!-- CALENDAR -->
<div class="cv" id="calView">
  <div id="calLoading" class="loading-bar">
    <span class="spin">⏳</span>
    <span>טוען לוח שעות...</span>
  </div>
  <div id="calReady" style="display:none">
    <div class="mnav">
      <button class="nbtn" onclick="changeMonth(-1)">‹</button>
      <h2 id="mTitle"></h2>
      <button class="nbtn" onclick="changeMonth(1)">›</button>
    </div>
    <div class="cal-wrap" id="calGrid"></div>
  </div>
</div>

<!-- DAY VIEW -->
<div class="dv" id="dayView">
  <div class="dvh">
    <button class="bbtn" onclick="backToCal()">← חזרה</button>
    <h2 id="dvTitle"></h2>
    <div id="dvBadge" class="dbadge" style="display:none"></div>
  </div>
  <div id="cancelBanner" style="display:none"></div>
  <div id="dayContent"></div>
</div>

<!-- PRODUCTIONS -->
<div class="prod" id="prodView">
  <h2 style="font-size:22px;font-weight:900;color:var(--purple);margin-bottom:20px">🎭 הפקות העונה</h2>
  <div class="prod-grid" id="prodGrid"></div>
</div>

<!-- ADMIN -->
<div class="adm" id="admView">
  <div class="status-bar">
    <div style="font-size:12px;font-weight:700;color:var(--purple)">🔗 Google Sheets – שמירה אוטומטית</div>
    <div id="syncStatus" class="status-txt"></div>
    <button class="abtn pri" style="font-size:11px;padding:5px 12px" onclick="loadData().then(()=>{renderCal();renderAdmList();renderShows();})">🔄 רענן</button>
  </div>
  <div class="adm-grid">
    <div>
      <div class="asec">
        <h3>ימים עם שינויים</h3>
        <div id="admList"></div>
      </div>
      <div class="asec">
        <h3>🎭 עריכת הפקות</h3>
        <p style="font-size:12px;color:var(--ink2);margin-bottom:12px">לחץ על הפקה לעריכת פרטים, תאריכים ושעות</p>
        <div id="showsList"></div>
      </div>
    </div>
    <div>
      <div class="asec">
        <h3>עריכה חיה של יום</h3>
        <div class="arow">
          <input type="date" id="admDate" class="ainp" style="flex:1" onchange="loadAdmDay()">
          <button class="abtn pri" onclick="loadAdmDay()">טען</button>
        </div>
        <div id="admDayLabel" style="font-size:13px;color:var(--ink2);margin-bottom:10px"></div>
        <div id="cancelRow" style="display:none;margin-bottom:14px;padding:12px;background:#f5f5f5;border-radius:10px;border:2px solid #ddd">
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
            <span style="font-size:13px;font-weight:700">ביטול סדנה</span>
            <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px">
              <input type="checkbox" id="cancelCheck" onchange="toggleCancel()" style="width:18px;height:18px;cursor:pointer">

</div>

<script>
// ══════════════════════════════════════════════════════
//  CONSTANTS
// ══════════════════════════════════════════════════════
const COL={

const GL={הו:"כיתה ה-ו",ז:"כיתות ז'",דושא:"דוש א",דושב:"דוש ב",דושג:"דוש ג",אנסמבל:"אנסמבל"};
const HEM=['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
const HED=['א','ב','ג','ד','ה','ו','ש'];
const TEACHER_COLORS={

const SHOWS=[
  {date:'2026-04-29',name:"אימפרו",          group:'דושב',   times:['19:00','20:30']},
  {date:'2026-04-30',name:"אימפרו",          group:'דושב',   times:['19:00','20:30']},

  {date:'2026-05-11',name:"המורדים",         group:'דושב',   times:['17:00','19:45']},
  {date:'2026-05-12',name:"המורדים",         group:'דושב',   times:['17:00','19:45']},
  {date:'2026-05-13',name:"המורדים",         group:'דושב',   times:['17:00','19:45']},

  {date:'2026-06-04',name:"סוף טוב",         group:'אנסמבל', times:['18:30','20:30']},
  {date:'2026-06-11',name:"דיאלוגים",        group:'דושא',   times:['18:00','19:30']},
  {date:'2026-06-21',name:"גיבורות מהאגדות – המחזמר", group:'', times:[]},
  {date:'2026-06-22',name:"גיבורות מהאגדות – המחזמר", group:'', times:[]},
  {date:'2026-06-23',name:"גיבורות מהאגדות – המחזמר", group:'', times:[]},
  {date:'2026-06-25',name:"ערב מגירה – הפנינג סיום שנה", group:'', times:[]},
];

// בונה slots של מופע עבור קבוצה ביום (כל מופע = 90 דקות)
function getShowSlots(ds, group){
  const sh = SHOWS.find(s => s.date===ds && s.group===group);
  if(!sh || !sh.times || !sh.times.length) return [];
  return sh.times.map(t => {
    const [h,m] = t.split(':').map(Number);
    const endMin = h*60 + m + 90;
    const end = `${String(Math.floor(endMin/60)).padStart(2,'0')}:${String(endMin%60).padStart(2,'0')}`;
    return { start: t, end, teacher: `🎭 ${GL[group]||group}: ${sh.name}`, note:'', type:'מופע' };
  });
}

// ══════════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════════
let schedule = {};      // date → { title, dayKey, cancelled, cancelNote, groups }
let admDs = '', admDk = '';
let editGrp = '', editIdx = -1, isNewSlot = false;
let admWorkingDay = null;  // מחזיק את הנתונים שנערכים (לפני שמירה)
let cy, cm;

// ══════════════════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════════════════
function toMin(t){const[h,m]=t.split(':').map(Number);return h*60+m}
function minS(m){return`${String(Math.floor(m/60)).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`}
function fmtD(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function ddStr(ds){const[y,mo,d]=ds.split('-').map(Number);return`${String(d).padStart(2,'0')}/${String(mo).padStart(2,'0')}/${String(y).slice(-2)}`}

function slotCol(teacher,stype){
  if(stype&&TYPE_COL[stype])return TYPE_COL[stype];
  for(const[k,v] of Object.entries(TEACHER_COLORS)){if(teacher&&teacher.includes(k))return v;}
  return{bg:'#e8e0f5',text:'#3a1a6a',border:'#5b1f8a'};
}

function status(msg,type){
  const el=document.getElementById('syncStatus');if(!el)return;
  const c={ok:'#1a7a0a',warn:'#c89600',err:'#cc1a1a',info:'#5b1f8a'};
  el.textContent=msg;el.style.color=c[type]||'#555';
  if(type==='ok')setTimeout(()=>{el.textContent=''},3000);
}

// ══════════════════════════════════════════════════════
//  API – הכל דרך Apps Script (קריאה + כתיבה)
// ══════════════════════════════════════════════════════
const API_URL = 'https://script.google.com/macros/s/AKfycbzS8_Zah9P-NUCZiPS3ser2KTOyRF2I34mdNaqXnzYpGctX1A54ZVuiQhT6VfLBs-v5/exec';

function loadData(){
  status('🔄 טוען...','info');
  return new Promise(resolve=>{
    const cb='_cb'+Date.now();
    const s=document.createElement('script');
    s.src=`${API_URL}?action=read&callback=${cb}&v=${Date.now()}`;
    s.onerror=()=>{ s.remove();delete window[cb];status('❌ שגיאת רשת','err');resolve(); };
    window[cb]=data=>{
      s.remove();delete window[cb];
      if(data&&data.ok){
        schedule=data.schedule||{};
        if(data.productions&&data.productions.length){
          data.productions.forEach(p=>{
            const mapped={id:p.id,name:p.name,group:p.group,location:p.location,
              poster:p.poster?'images/'+p.poster:'',dates:p.dates};
            const idx=PRODUCTIONS.findIndex(x=>x.id===p.id);
            if(idx>=0)PRODUCTIONS[idx]=mapped; else PRODUCTIONS.push(mapped);
          });
        }
        status('✓ לוח טעון','ok');
      }else{
        status('⚠️ שגיאה: '+(data&&data.error||'לא ידוע'),'err');
      }
      resolve();
    };
    setTimeout(()=>{ if(window[cb]){s.remove();delete window[cb];status('⏱ timeout','warn');resolve();} },12000);
    document.head.appendChild(s);
  });
}

async function pushDay(date,data){
  schedule[date]=data;
  status('💾 שומר...','info');
  try{
    const r=await fetch(API_URL,{method:'POST',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body:JSON.stringify({action:'save_day',date,data})});
    const j=await r.json();
    if(j&&j.ok) status('✓ נשמר!','ok');
    else status('❌ '+(j&&j.error||'שגיאה'),'err');
  }catch(err){ status('❌ '+err.message,'err'); }
}

async function pushDelete(date){
  delete schedule[date];
  status('💾 מאפס...','info');
  try{
    const r=await fetch(API_URL,{method:'POST',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body:JSON.stringify({action:'delete_day',date})});
    const j=await r.json();
    if(j&&j.ok) status('✓ אופס!','ok');
    else status('❌ '+(j&&j.error||'שגיאה'),'err');
  }catch(err){ status('❌ '+err.message,'err'); }
}

  status('💾 שומר הפקה...','info');

    const r=await fetch(API_URL,{method:'POST',

      body:JSON.stringify({action:'save_production',id,data})});

    if(j&&j.ok) status('✓ הפקה נשמרה!','ok');

}

// ══════════════════════════════════════════════════════
//  CALENDAR
// ══════════════════════════════════════════════════════
function initCal(){const n=new Date();cy=n.getFullYear();cm=n.getMonth();}
function changeMonth(d){cm+=d;if(cm>11){cm=0;cy++}if(cm<0){cm=11;cy--}renderCal();}
function renderCal(){
  document.getElementById('mTitle').textContent=`${HEM[cm]} ${cy}`;
  const g=document.getElementById('calGrid');
  const first=new Date(cy,cm,1).getDay(),dim=new Date(cy,cm+1,0).getDate();
  const today=new Date();today.setHours(0,0,0,0);
  // בנה מפת תאריכי הפקות מ-PRODUCTIONS (מגיע מ-Sheets)
  const showDates={};
  PRODUCTIONS.forEach(p=>(p.dates||[]).forEach(d=>{
    if(d.date) showDates[d.date]=p.name;
  }));
  let h='<div class="ch">';
  HED.forEach((d,i)=>h+=`<div class="chc${(i===1||i===4)?' ws':''}">${d}</div>`);
  h+='</div><div class="cb2">';
  let cell=0;
  for(let i=0;i<first;i++){h+=`<div class="cd other"><div class="dn"></div></div>`;cell++;}
  for(let d=1;d<=dim;d++){
    const dt=new Date(cy,cm,d),dow=dt.getDay();
    const isWS=dow===1||dow===4,ds=fmtD(dt);
    const isToday=dt.getTime()===today.getTime();
    const dayData=schedule[ds];
    const isCancelled=dayData&&dayData.cancelled;
    const showName=showDates[ds];
    const hasMod=dayData&&!isCancelled&&(dayData.title||(Object.values(dayData.groups||{}).some(g=>(g.slots||[]).some(s=>s.type!=='רגיל'))));
    let cls='cd'+(isWS?' wsd':'')+(isToday?' today':'');
    let inner=`<div class="dn">${d}</div>`;
    if(isWS){
      const isThu=dow===4;
      if(isCancelled)  inner+=`<div class="ddot d-cancel">✕ מבוטל</div>`;
      else if(showName) inner+=`<div class="ddot d-show">🎭 ${showName.length>13?showName.slice(0,13)+'…':showName}</div>`;
      else if(hasMod)  inner+=`<div class="ddot d-mod">✦ ${(dayData.title||'שינויים').slice(0,14)}</div>`;
      else             inner+=`<div class="ddot ${isThu?'d-thu':'d-sun'}">${isThu?"יום ה'":'יום ב\''}</div>`;
    }
    h+=`<div class="${cls}" ${isWS?`onclick="openDay('${ds}',${dow})"`:''}>  ${inner}</div>`;
    cell++;
  }
  const rem=(7-(cell%7))%7;
  for(let i=0;i<rem;i++)h+=`<div class="cd other"></div>`;
  h+='</div>';
  g.innerHTML=h;
}

// ══════════════════════════════════════════════════════
//  DAY VIEW
// ══════════════════════════════════════════════════════
function openDay(ds,dow){
  const isThu=dow===4,dk=isThu?'thu':'sun';
  const dn=isThu?"יום ה'":'יום ב\'';
  document.getElementById('dvTitle').textContent=`${dn} ${ddStr(ds)}`;
  const d=schedule[ds];
  const badge=document.getElementById('dvBadge');
  const showToday=PRODUCTIONS.find(p=>(p.dates||[]).some(d=>d.date===ds));
  const badgeTxt=d&&d.title?d.title:showToday?`🎭 ${showToday.name}`:'';
  if(badgeTxt){badge.style.cssText='display:inline-block;font-size:11px;font-weight:700;padding:4px 12px;border-radius:20px;border:2px solid #cc1a1a;background:#ffe8e8;color:#8a0808';badge.textContent=badgeTxt;}
  else badge.style.display='none';

  const cb=document.getElementById('cancelBanner'),dc=document.getElementById('dayContent');
  if(d&&d.cancelled){
    cb.style.display='block';
    cb.innerHTML=`<div class="cancel-banner"><h3>❌ הסדנה בוטלה ליום זה</h3>${d.cancelNote?`<p>${d.cancelNote}</p>`:''}</div>`;
    dc.innerHTML='';
  }else{
    cb.style.display='none';
    const groups=dk==='thu'?['הו','דושא','דושב','דושג','אנסמבל']:['ז','דושא','דושב','דושג','אנסמבל'];
    let html=buildLegend(ds,groups);
    html+=`<div class="sw"><table class="stbl"><thead id="_th"></thead><tbody id="_tb"></tbody></table></div>`;
    dc.innerHTML=html;
    renderDayTable(ds,dk,groups);
  }
  document.getElementById('calView').classList.add('off');
  document.getElementById('dayView').classList.add('on');
}
function backToCal(){document.getElementById('calView').classList.remove('off');document.getElementById('dayView').classList.remove('on');}

function buildLegend(ds,groups){
  const teachers=new Set();
  groups.forEach(g=>{
    const slots=getSlots(ds,g);
    slots.forEach(s=>{ if(s.type!=='מופע') teachers.add(s.teacher); });
  });
  let h='<div class="legend">';
  teachers.forEach(t=>{const c=slotCol(t,'רגיל');h+=`<div class="leg-item"><div class="leg-dot" style="background:${c.bg};border:1.5px solid ${c.border}"></div><span style="color:${c.text}">${t}</span></div>`;});
  // הוסף מופע ללגנדה אם יש
  const hasShow=SHOWS.some(s=>s.date===ds&&s.group);
  if(hasShow) h+=`<div class="leg-item"><div class="leg-dot" style="background:#ead5ff;border:1.5px solid #7b1fa2"></div><span style="color:#4a0072">🎭 מופע</span></div>`;
  return h+'</div>';
}

// חישוב טווח שעות דינמי לפי תוכן היום
function getDayTimeRange(ds, groups){
  let minT = 16*60, maxT = 22*60;
  groups.forEach(g=>{
    getSlots(ds,g).forEach(sl=>{
      minT = Math.min(minT, toMin(sl.start));
      maxT = Math.max(maxT, toMin(sl.end));
    });
  });
  // עגל ל-30 דקות
  minT = Math.floor(minT/30)*30;
  maxT = Math.ceil(maxT/30)*30;
  return {minT, maxT};
}

// מחזיר slots עבור קבוצה ביום (מהשידול אם קיים, אחרת default) + ריבועי מופע
function getSlots(ds, group){
  const d = schedule[ds];
  let slots;
  if(d && d.groups && d.groups[group]){
    slots = [...(d.groups[group].slots||[])];
  } else {
    const dow = new Date(ds+'T12:00:00').getDay();
    const def = dow===4 ? DEF_THU : DEF_SUN;
    const dg  = def.find(x=>x.group===group);
    slots = dg ? JSON.parse(JSON.stringify(dg.slots)) : [];
  }
  // הוסף ריבועי מופע
  const showSlots = getShowSlots(ds, group);
  return [...slots, ...showSlots];
}

// ── ברירת מחדל ──
const DEF_SUN=[
  {group:'ז',slots:[{start:'17:30',end:'18:30',teacher:'איילה',note:'שיעור מוזיקה',type:'רגיל'},{start:'18:30',end:'20:00',teacher:'איתמר',note:'',type:'רגיל'}]},
  {group:'דושא',slots:[{start:'16:00',end:'17:30',teacher:'איקה',note:'',type:'רגיל'},{start:'17:30',end:'18:30',teacher:'איתמר',note:'',type:'רגיל'}]},
  {group:'דושב',slots:[{start:'16:30',end:'17:30',teacher:'איתמר',note:'',type:'רגיל'},{start:'17:30',end:'19:00',teacher:'איקה',note:'',type:'רגיל'}]},
  {group:'דושג',slots:[{start:'19:30',end:'21:00',teacher:'איקה',note:'',type:'רגיל'},{start:'21:00',end:'22:00',teacher:'איתמר',note:'',type:'רגיל'}]},
  {group:'אנסמבל',slots:[{start:'20:00',end:'21:00',teacher:'איתמר',note:'',type:'רגיל'},{start:'21:00',end:'22:30',teacher:'איקה',note:'',type:'רגיל'}]},
];
const DEF_THU=[
  {group:'הו',slots:[{start:'17:30',end:'19:00',teacher:'איילה, שי ואורי',note:'',type:'רגיל'}]},
  {group:'דושא',slots:[{start:'16:00',end:'17:30',teacher:'איקה',note:'',type:'רגיל'},{start:'17:30',end:'18:30',teacher:'איתמר',note:'',type:'רגיל'}]},
  {group:'דושב',slots:[{start:'16:30',end:'17:30',teacher:'איתמר',note:'',type:'רגיל'},{start:'17:30',end:'19:00',teacher:'איקה',note:'',type:'רגיל'}]},
  {group:'דושג',slots:[{start:'18:30',end:'19:30',teacher:'איתמר',note:'',type:'רגיל'},{start:'19:30',end:'21:00',teacher:'איקה',note:'',type:'רגיל'}]},
  {group:'אנסמבל',slots:[{start:'19:30',end:'21:00',teacher:'איתמר',note:'',type:'רגיל'},{start:'21:00',end:'22:30',teacher:'איקה',note:'',type:'רגיל'}]},
];

function buildCovMap(slots){
  const cov={};
  (slots||[]).forEach(sl=>{for(let t=toMin(sl.start);t<toMin(sl.end);t+=30)cov[t]={...sl};});
  return cov;
}
function buildCellMaps(groups,ds,minT,maxT){
  const timeSlots=[];for(let t=minT;t<=maxT;t+=30)timeSlots.push(t);
  return groups.map(g=>{
    const slots=getSlots(ds,g);
    const cov=buildCovMap(slots);
    const cm={};let i=0;
    while(i<timeSlots.length){
      const t=timeSlots[i],cv=cov[t];
      if(!cv){cm[t]={t:'e'};i++;continue;}
      let span=1;
      while(i+span<timeSlots.length){const nc=cov[timeSlots[i+span]];if(nc&&nc.start===cv.start&&nc.end===cv.end)span++;else break;}
      cm[t]={t:'c',span,...cv};
      for(let s=1;s<span;s++)cm[timeSlots[i+s]]={t:'s'};
      i+=span;
    }
    return cm;
  });
}

function loadAdmDay(){
  const ds=document.getElementById('admDate').value;if(!ds)return;
  admDs=ds;
  const dt=new Date(ds+'T12:00:00'),dow=dt.getDay();
  admDk=dow===4?'thu':'sun';
  const dn=dow===4?"יום ה'":'יום ב\'';
  const showToday=SHOWS.find(s=>s.date===ds);
  document.getElementById('admDayLabel').innerHTML=
    `<strong>${dn}, ${ddStr(ds)}</strong>`+
    (showToday?` <span style="background:#ffe0e0;color:#8a0808;border:1.5px solid #cc1a1a;border-radius:8px;padding:2px 8px;font-size:11px;font-weight:700">🎭 ${showToday.name}</span>`:'');
  document.getElementById('cancelRow').style.display='block';
  document.getElementById('titleRow').style.display='block';
  document.getElementById('admAddBtn').style.display='flex';

  // deep-clone working copy
  const existing=schedule[ds];
  admWorkingDay=JSON.parse(JSON.stringify(existing||{title:'',dayKey:admDk,cancelled:false,cancelNote:'',groups:{}}));
  if(!admWorkingDay.groups)admWorkingDay.groups={};

  // הזרק slots של מופעים לתוך working day (כך שניתנים לעריכה)
  const groups=admDk==='thu'?['הו','דושא','דושב','דושג','אנסמבל']:['ז','דושא','דושב','דושג','אנסמבל'];
  groups.forEach(g=>{
    const showSlots=getShowSlots(ds,g);
    if(!showSlots.length)return;
    // הבטח שהקבוצה קיימת ב-working day עם כל ה-slots שלה
    if(!admWorkingDay.groups[g]){
      const def=admDk==='thu'?DEF_THU:DEF_SUN;
      const dg=def.find(x=>x.group===g);
      admWorkingDay.groups[g]={start:'',end:'',slots:dg?JSON.parse(JSON.stringify(dg.slots)):[]};
    }
    // הוסף show slots רק אם עוד לא קיימים
    showSlots.forEach(ss=>{
      const exists=admWorkingDay.groups[g].slots.some(s=>s.start===ss.start&&s.end===ss.end);
      if(!exists) admWorkingDay.groups[g].slots.push(ss);
    });
  });

  document.getElementById('cancelCheck').checked=!!admWorkingDay.cancelled;
  document.getElementById('cancelNoteRow').style.display=admWorkingDay.cancelled?'block':'none';
  document.getElementById('cancelNote').value=admWorkingDay.cancelNote||'';
  document.getElementById('admTitle').value=admWorkingDay.title||'';
  renderAdmTable();
}

function toggleCancel(){
  const checked=document.getElementById('cancelCheck').checked;
  document.getElementById('cancelNoteRow').style.display=checked?'block':'none';
  admWorkingDay.cancelled=checked;
  renderAdmTable();
}

function renderAdmTable(){
  if(!admDs){document.getElementById('admTblWrap').innerHTML='';return;}
  if(admWorkingDay&&admWorkingDay.cancelled){
    document.getElementById('admTblWrap').innerHTML=`<div style="background:#f0f0f0;border-radius:10px;padding:16px;text-align:center;color:#555;font-size:13px">הסדנה מבוטלת. בטל את הסימון כדי לערוך.</div>`;
    return;
  }
  const groups=admDk==='thu'?['הו','דושא','דושב','דושג','אנסמבל']:['ז','דושא','דושב','דושג','אנסמבל'];

  // חשב טווח שעות דינמי
  let minT=16*60, maxT=22*60;
  groups.forEach(g=>{
    getWorkingSlots(g).forEach(sl=>{
      minT=Math.min(minT,toMin(sl.start));
      maxT=Math.max(maxT,toMin(sl.end));
    });
  });
  minT=Math.floor(minT/30)*30;
  maxT=Math.ceil(maxT/30)*30;
  const timeSlots=[];for(let t=minT;t<=maxT;t+=30)timeSlots.push(t);

  // בנה cell maps – כל ה-slots ניתנים לעריכה (כולל מופעים)
  const cms=groups.map(g=>{
    const wSlots=getWorkingSlots(g);
    const cov=buildCovMap(wSlots);
    const cm={};let i=0;
    while(i<timeSlots.length){
      const t=timeSlots[i],cv=cov[t];
      if(!cv){cm[t]={t:'e'};i++;continue;}
      let span=1;
      while(i+span<timeSlots.length){const nc=cov[timeSlots[i+span]];if(nc&&nc.start===cv.start&&nc.end===cv.end)span++;else break;}
      cm[t]={t:'c',span,...cv};
      for(let s=1;s<span;s++)cm[timeSlots[i+s]]={t:'s'};
      i+=span;
    }
    return cm;
  });

  let hh=`<table class="etbl"><thead><tr><th class="etc">שעה</th>`;
  groups.forEach(g=>{const c=COL[g]||{bg:'#eee',text:'#333',border:'#ccc'};hh+=`<th style="background:${c.bg};color:${c.text};border-bottom:3px solid ${c.border};font-size:11px">${GL[g]||g}</th>`;});
  hh+=`</tr></thead><tbody>`;
  timeSlots.forEach(t=>{
    hh+=`<tr><td class="etcel">${minS(t)}</td>`;
    groups.forEach((g,gi)=>{
      const cell=cms[gi][t];
      if(!cell||cell.t==='s')return;
      if(cell.t==='e'){hh+=`<td><div class="ecell-add" onclick="openNewSlotAt('${g}','${minS(t)}')">+</div></td>`;return;}
      const c=slotCol(cell.teacher,cell.type);
      const slots=getWorkingSlots(g);
      const si=slots.findIndex(sl=>sl.start===cell.start&&sl.end===cell.end&&sl.teacher===cell.teacher);
      hh+=`<td rowspan="${cell.span}" style="background:${c.bg};border:2px solid ${c.border}"><div class="ecell" onclick="openEdit('${g}',${si})" style="color:${c.text}"><div class="ecell-in"><div class="ec-t">${cell.teacher}</div><div class="ec-s">${cell.start}–${cell.end}</div></div></div></td>`;
    });
    hh+=`</tr>`;
  });
  hh+=`</tbody></table>`;
  document.getElementById('admTblWrap').innerHTML=hh;
}

function getWorkingSlots(group){
  if(admWorkingDay&&admWorkingDay.groups&&admWorkingDay.groups[group])
    return admWorkingDay.groups[group].slots||[];
  const def=admDk==='thu'?DEF_THU:DEF_SUN;
  const dg=def.find(x=>x.group===group);
  return dg?JSON.parse(JSON.stringify(dg.slots)):[];
}

function ensureWorkingGroup(group){
  if(!admWorkingDay.groups[group]){
    admWorkingDay.groups[group]={start:'',end:'',slots:JSON.parse(JSON.stringify(getWorkingSlots(group)))};
  }
}

function doSaveSlot(){
  const start=document.getElementById('spS').value;
  const end=document.getElementById('spE').value;
  const teacher=document.getElementById('spT').value.trim();
  const note=document.getElementById('spN').value.trim();
  const type=document.getElementById('spTy').value;
  const group=document.getElementById('spGroup').value;
  if(!start||!end||!teacher){alert('נא למלא שעות ומורה');return;}
  ensureWorkingGroup(group);
  const slots=admWorkingDay.groups[group].slots;
  if(isNewSlot)slots.push({start,end,teacher,note,type});
  else slots[editIdx]={start,end,teacher,note,type};
  // recalc span
  admWorkingDay.groups[group].start=slots.reduce((mn,s)=>toMin(s.start)<toMin(mn)?s.start:mn,slots[0].start);
  admWorkingDay.groups[group].end=slots.reduce((mx,s)=>toMin(s.end)>toMin(mx)?s.end:mx,slots[0].end);
  closePop();renderAdmTable();
}

function doDelSlot(){
  if(!confirm('מחק שיעור זה?'))return;
  ensureWorkingGroup(editGrp);
  admWorkingDay.groups[editGrp].slots.splice(editIdx,1);
  if(!admWorkingDay.groups[editGrp].slots.length)delete admWorkingDay.groups[editGrp];
  closePop();renderAdmTable();
}

const HEB_MONTHS = ['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];

function fmtDateHeb(ds){
  const [y,m,d] = ds.split('-').map(Number);
  return `${d} ${HEB_MONTHS[m-1]}`;
}

function renderProductions(){
  const el = document.getElementById('prodGrid'); if(!el) return;
  let html = '';
  PRODUCTIONS.forEach(p => {
    const c = p.group && COL[Object.keys(COL).find(k=>GL[k]===p.group||k===p.group)] || {bg:'#f0e8ff',text:'#5b1f8a',border:'#5b1f8a'};
    // poster
    const posterHtml = `<img class="prod-poster" src="${p.poster}" alt="${p.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <div class="prod-poster-placeholder" style="display:none">🎭</div>`;
    // dates
    const datesHtml = p.dates.map(d => {
      const timesHtml = d.times.length
        ? d.times.map(t=>`<span class="prod-time">${t}</span>`).join('')
        : '<span class="prod-time">שעה תפרסם בקרוב</span>';
      return `<div style="padding:6px 0;border-bottom:1px solid var(--border)">
        <div style="font-size:12px;font-weight:700;color:var(--ink);margin-bottom:4px">${d.day}, ${fmtDateHeb(d.date)}</div>
        <div class="prod-times">${timesHtml}</div>
      </div>`;
    }).join('');

    html += `<div class="prod-card">
      ${posterHtml}
      <div class="prod-info">
        <div class="prod-name">${p.name}</div>
        <div class="prod-rows">
          ${p.group ? `<div class="prod-row"><span class="prod-label">קבוצה</span><span class="prod-val" style="background:${c.bg};color:${c.text};padding:2px 8px;border-radius:7px;font-weight:700">${p.group}</span></div>` : ''}
          <div class="prod-row"><span class="prod-label">מיקום</span><span class="prod-val">${p.location}</span></div>
          <div class="prod-row" style="flex-direction:column;gap:2px"><span class="prod-label" style="margin-bottom:4px">תאריכים</span>${datesHtml}</div>
        </div>
      </div>
    </div>`;
  });
  el.innerHTML = html;
}


initCal();
loadData().then(()=>{
  if(!schedule || Object.keys(schedule).length === 0){
    const start = new Date(2026,3,20), end = new Date(2026,5,30);
    for(let d=new Date(start); d<=end; d.setDate(d.getDate()+1)){
      const dow = d.getDay();
      if(dow!==1 && dow!==4) continue;
      const ds = fmtD(d);
      schedule[ds] = {title:'',dayKey:dow===4?'thu':'sun',cancelled:false,cancelNote:'',groups:{}};
    }
  }
  document.getElementById('calLoading').style.display='none';
  document.getElementById('calReady').style.display='block';
  renderCal();
});

setInterval(()=>{
  // רענן רק אם לא בניהול (כדי לא להפריע לעריכה)
  if(document.getElementById('admView').classList.contains('on')) return;
  loadData().then(()=>{
    renderCal();
    // אם פתוח יום – רענן אותו גם
    if(document.getElementById('dayView').classList.contains('on')){
      const title = document.getElementById('dvTitle').textContent;
      // חלץ תאריך מהכותרת (dd/mm/yy) ורענן
      const m = title.match(/(\d{2})\/(\d{2})\/(\d{2})/);
      if(m){
        const ds = `20${m[3]}-${m[2]}-${m[1]}`;
        const dt = new Date(ds+'T12:00:00');
        const groups = dt.getDay()===4
          ? ['הו','דושא','דושב','דושג','אנסמבל']
          : ['ז','דושא','דושב','דושג','אנסמבל'];
        renderDayTable(ds, dt.getDay()===4?'thu':'sun', groups);
      }
    }
  });
}, 2 * 60 * 1000); // כל 2 דקות
